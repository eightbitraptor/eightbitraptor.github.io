  <title>Guitars</title>
  <style>
    :root {
      --bg: #14110f;
      --fg: #f2ede6;
      --muted: #b3a89b;
      --accent: #c9a227;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--fg);
      line-height: 1.5;
    }
    header {
      padding: 3rem 1.5rem 1rem;
      text-align: center;
    }
    header h1 {
      margin: 0;
      font-size: 2rem;
      letter-spacing: 0.02em;
    }
    section {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem 1.5rem 3rem;
    }
    section h2 {
      font-size: 1.5rem;
      margin: 0 0 0.25rem;
    }
    section .subtitle {
      color: var(--muted);
      margin: 0 0 1.5rem;
      font-style: italic;
    }
    section h2 .swatch {
      display: inline-block;
      width: 0.85em;
      height: 0.85em;
      border-radius: 50%;
      margin-right: 0.4em;
      vertical-align: baseline;
      border: 1px solid rgba(255,255,255,0.25);
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1rem;
    }
    .grid a {
      display: block;
      border-radius: 8px;
      overflow: hidden;
      background: #000;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }
    .grid img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      aspect-ratio: 3 / 4;
      transition: transform 0.2s ease;
    }
    .grid a:hover img { transform: scale(1.03); }
    hr {
      border: none;
      border-top: 1px solid rgba(255,255,255,0.1);
      max-width: 1200px;
      margin: 0 auto;
    }
  </style>
</head>
